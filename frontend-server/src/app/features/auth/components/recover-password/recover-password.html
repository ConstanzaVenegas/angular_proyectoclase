<div class="container">
  <div class="omb_login">
    <h3 class="omb_authTitle">Recuperar contraseña</h3>
    <p class="text-muted small text-center">Ingresa tu email y te enviaremos un código de verificación.</p>

    <div class="row omb_row-sm-offset-3">
      <div class="col-12 col-sm-6">
        <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">

          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>
            <input formControlName="email"
                   type="email"
                   class="form-control"
                   placeholder="Tu email registrado">
          </div>
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <div class="text-danger small mt-1">Ingresa un email válido.</div>
          }

          <br>

          @if (errorMsg) {
            <div class="alert py-2 small"
                 [class.alert-danger]="!errorMsg.includes('Google')"
                 [class.alert-warning]="errorMsg.includes('Google')">
              <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMsg }}
              @if (errorMsg.includes('Google')) {
                <br><a routerLink="/login" class="alert-link">Volver al login</a>
              }
            </div>
          }

          <button class="btn btn-lg btn-primary w-100" type="submit" [disabled]="loading">
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2"></span> Enviando...
            } @else {
              <i class="bi bi-send-fill me-2"></i> Enviar código
            }
          </button>

        </form>

        <br>
        <div class="text-center">
          <a routerLink="/login" class="text-muted small">
            <i class="bi bi-arrow-left"></i> Volver al login
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
